server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy API + health checks to the Go service (same compose network).
    location /api/ {
        proxy_pass http://app:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
    location = /healthz { proxy_pass http://app:8080; }
    location = /readyz  { proxy_pass http://app:8080; }

    # Prometheus metrics must never be reachable through the public front
    # door; scrape the app service directly on the compose network instead.
    location = /metrics { return 404; }

    # Console routes serve the app shell. Exact matches rank above the
    # short-code regex below, and these segments are reserved server-side so
    # they can never be claimed as aliases.
    location = /links    { try_files /index.html =404; }
    location = /webhooks { try_files /index.html =404; }
    location = /settings { try_files /index.html =404; }

    # Long-cache fingerprinted assets. ^~ ranks this prefix above regexes.
    location ^~ /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Any other single URL-safe path segment is a short code: serve a real
    # file if one exists, otherwise hand it to the redirect hot path.
    location ~ "^/[A-Za-z0-9_-]{3,64}$" {
        try_files $uri @app;
    }

    # SPA fallback: everything else (/, /links/:id, ...) serves the app shell.
    location / {
        try_files $uri $uri/ /index.html;
    }

    location @app {
        proxy_pass http://app:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
