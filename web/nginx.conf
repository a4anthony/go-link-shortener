server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy API + health checks to the Go service (same compose network).
    location /api/ {
        proxy_pass http://app:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
    location = /healthz { proxy_pass http://app:8080; }
    location = /readyz  { proxy_pass http://app:8080; }

    # SPA fallback: every other route serves the app shell (client-side routing).
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long-cache fingerprinted assets.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
