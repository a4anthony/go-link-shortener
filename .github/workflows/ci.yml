name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  GO_VERSION: "1.25"
  GOLANGCI_LINT_VERSION: "v2.12.2"

jobs:
  lint:
    name: Lint & Vet
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: go vet
        run: go vet ./...
      # Build golangci-lint from source with the Go 1.25 toolchain so its
      # build-go-version is not lower than the module's targeted go directive
      # (the prebuilt release binaries lag a Go version behind and are rejected).
      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@${{ env.GOLANGCI_LINT_VERSION }}
      - name: golangci-lint
        run: golangci-lint run --timeout=5m ./...

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Unit tests
        run: go test -race -count=1 -coverprofile=coverage.txt ./...
      - name: Coverage summary
        run: go tool cover -func=coverage.txt | tail -1

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    # Integration tests spin ephemeral Postgres/Redis via testcontainers-go,
    # which uses the Docker daemon preinstalled on GitHub-hosted runners.
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Integration tests
        run: go test -race -count=1 -tags=integration ./...

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Build binary
        run: go build -ldflags="-s -w" -o bin/server ./cmd/server

  bench:
    name: Benchmarks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Run benchmarks
        run: go test -bench=. -benchmem -run='^$' ./... || true

  web:
    name: Web (typecheck & build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install deps
        run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Build
        run: npm run build
