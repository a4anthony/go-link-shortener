version: "2"

run:
  timeout: 5m
  tests: true

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - bodyclose
    - gosec
    - misspell
    - unconvert
    - unparam
    - nakedret
    - revive
  settings:
    gosec:
      excludes:
        - G404 # math/rand acceptable for non-crypto jitter; crypto/rand used where it matters
    revive:
      rules:
        - name: exported
          disabled: true
  exclusions:
    rules:
      # Test files may skip error checks on helper teardown and use weaker rand.
      - path: _test\.go
        linters:
          - errcheck
          - gosec
          - unparam
