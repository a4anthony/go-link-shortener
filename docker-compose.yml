services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: urlshortener
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d urlshortener"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      APP_ENV: dev
      APP_BASE_URL: http://localhost:8080
      SERVER_HOST: 0.0.0.0
      SERVER_PORT: "8080"
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/urlshortener?sslmode=disable
      REDIS_ADDR: redis:6379
    ports:
      - "8080:8080"

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    depends_on:
      - app
    # Host port is overridable to avoid local conflicts: WEB_PORT=3000 docker compose up
    ports:
      - "${WEB_PORT:-8090}:80"

volumes:
  pgdata:
  redisdata:
